name: Daily Vegetable Price Report

on:
  schedule:
    # JST 9:00 (UTC 0:00) に実行。市場の値が確定する時刻に応じて調整してください。
    - cron: "0 0 * * *"
  workflow_dispatch: {}  # 手動実行用ボタンも有効化

permissions:
  contents: write  # CSVをコミットするために必要

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run report script
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python3 main.py

      - name: Commit updated price history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/price_history.csv
          git diff --staged --quiet || git commit -m "Update price history $(date +'%Y-%m-%d')"
          git push
